<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Info — TikTok Connected</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    .box { max-width: 480px; padding: 3rem 2rem; }
    .check { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 2rem; font-weight: 900; margin-bottom: 0.8rem; }
    h1 span { color: #FF1493; }
    p { color: #666; line-height: 1.7; margin-bottom: 2rem; }
    a { background: #FF1493; color: #000; font-weight: 800; padding: 0.9rem 2rem; border-radius: 8px; text-decoration: none; display: inline-block; }
  </style>
  <script>
    // Redirect back to the publisher with the auth code
    window.onload = function() {
      const params = window.location.search;
      setTimeout(() => {
        window.location.href = '/tiktok/' + params;
      }, 2000);
    }
  </script>
</head>
<body>
  <div class="box">
    <div class="check">✅</div>
    <h1>TikTok <span>Connected</span></h1>
    <p>Your TikTok account has been successfully connected to OpenClaw Info. Redirecting you back to the publisher...</p>
    <a href="/tiktok/">Return to Publisher</a>
  </div>
</body>
</html>
